<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hockey Management System</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/newstyle.css') }}">
</head>
<body>

    <section class="hero">
        <div class="container">
            <div class="d-flex align-items-center justify-content-center">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">
                <div>
                    <h1 class="mb-0">Hockey Management System</h1>
                    <p class="mb-0">Login to access your portal</p>
                </div>
            </div>
        </div>
    </section>

    <main>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card border-0 card-box">
                        <div class="card-body p-4">
                            <h2 class="text-center mb-4">Login</h2>

                            {% if error %}
                                <div class="alert alert-danger" role="alert">
                                    {{ error }}
                                </div>
                            {% endif %}

                            <form method="POST" action="/login">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-danger">Login</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
