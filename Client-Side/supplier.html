<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier Portal</title>

  <!-- bootstrap css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- shared css -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/newstyle.css') }}">

  <style>
    body {
      background: linear-gradient(180deg, #f04a4a 0%, #a81f1f 100%);
      min-height: 100vh;
    }

    .supplier-topbar {
      background: linear-gradient(90deg, #3d2029 0%, #4a2a2a 100%);
      color: white;
      padding: 20px 0;
    }

    .supplier-stat-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
      height: 100%;
    }

    .supplier-section-card {
      background: #f2f2f5;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
    }

    .section-chip {
      display: inline-block;
      background: #d9d9d9;
      border-radius: 999px;
      padding: 6px 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .order-card-new {
      background: #cfdcff;
      border-radius: 12px;
      padding: 18px;
    }

    .order-card-sub {
      background: #aeb8c6;
      border-radius: 12px;
      padding: 18px;
      margin-top: 12px;
    }

    .order-card-neutral {
      background: #dddddf;
      border-radius: 12px;
      padding: 18px;
    }

    .supplier-btn-primary {
      background: #2b16ff;
      border-color: #2b16ff;
      color: white;
      font-weight: 600;
    }

    .supplier-btn-secondary {
      background: #6c2cff;
      border-color: #6c2cff;
      color: white;
      font-weight: 600;
    }

    .metric-number-blue { color: #2c47ff; font-weight: 700; }
    .metric-number-purple { color: #6c2cff; font-weight: 700; }
    .metric-number-orange { color: #e86f31; font-weight: 700; }

    .text-status-new { color: #2c47ff; font-weight: 700; }
    .text-status-progress { color: #5a31ff; font-weight: 700; }
    .text-status-completed { color: #39c61a; font-weight: 700; }

    .text-label-accent { color: #ff8c00; font-weight: 700; }
  </style>

</head>

<body>

  <!-- HEADER -->
  <header class="supplier-topbar">
    <div class="container">
      <div class="row align-items-center gy-3">

        <div class="col-md-3">
          <div class="d-flex align-items-center">
            <span class="fw-bold">UMD Hockey</span>
          </div>
        </div>

        <div class="col-md-6 text-center">
          <h1 class="h2 mb-0">Supplier Portal</h1>
        </div>

        <div class="col-md-3 text-md-end">
          <div class="d-inline-block text-start">
            <div class="fw-semibold">Account Name</div>
            <div>Supplier</div>
          </div>
        </div>

      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container my-4">

    <!-- stats -->
    <div class="row g-4 mb-4">

      <div class="col-md-4">
        <div class="supplier-stat-card">
          <div>New Orders</div>
          <div class="display-6 metric-number-blue">15</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="supplier-stat-card">
          <div>In Progress</div>
          <div class="display-6 metric-number-purple">3</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="supplier-stat-card">
          <div>Completed</div>
          <div class="display-6 metric-number-orange">3</div>
        </div>
      </div>

    </div>

    <!-- NEW ORDERS -->
    <div class="supplier-section-card mb-4">
      <div class="section-chip">NEW ORDERS</div>

      <div class="order-card-new">
        <p><strong>ORDER #1</strong></p>
        <button class="btn supplier-btn-primary" data-bs-toggle="modal" data-bs-target="#confirmOrderModal">
          Confirm Order
        </button>
      </div>
    </div>

    <!-- BACK BUTTONS (FIXED) -->
    <div class="d-flex gap-2 flex-wrap">
      <a href="{{ url_for('public_page') }}" class="btn btn-light">Public Site</a>
      <a href="{{ url_for('admin_page') }}" class="btn btn-dark">Admin Dashboard</a>
      <a href="{{ url_for('roster') }}" class="btn btn-outline-light">Roster</a>
      <a href="{{ url_for('schedule') }}" class="btn btn-outline-light">Schedule</a>
      <a href="{{ url_for('equipment') }}" class="btn btn-outline-light">Equipment</a>
      <a href="{{ url_for('finances') }}" class="btn btn-outline-light">Finances</a>
      <a href="{{ url_for('newsletters') }}" class="btn btn-outline-light">Newsletters</a>
      <a href="{{ url_for('alumni') }}" class="btn btn-outline-light">Alumni</a>
      <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
    </div>

  </main>

  <!-- MODAL -->
  <div class="modal fade" id="confirmOrderModal">
    <div class="modal-dialog">
      <div class="modal-content p-3">
        <h5>Confirm Order</h5>
        <button class="btn btn-success">Save</button>
      </div>
    </div>
  </div>

  <!-- bootstrap js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
